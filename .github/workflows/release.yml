name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
            runner: ubuntu-latest
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: .exe
            runner: ubuntu-latest
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
            runner: macos-latest

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Generate Windows resource files (icon, version info, manifest)
      - name: Install go-winres
        if: matrix.goos == 'windows'
        run: go install github.com/tc-hib/go-winres@latest

      - name: Generate Windows resources
        if: matrix.goos == 'windows'
        run: |
          cd cmd/aigw && go-winres make && cd ../..
          cd cmd/aigw-tray && go-winres make && cd ../..

      - name: Build Agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist
          TAGS=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            TAGS="-tags nollm"
          fi
          go build $TAGS \
            -ldflags "-X main.version=${{ github.ref_name }}" \
            -o dist/aigw-${{ matrix.suffix }}${{ matrix.ext }} \
            ./cmd/aigw

      - name: Build Tray Manager (Windows)
        if: matrix.goos == 'windows'
        env:
          GOOS: windows
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build -tags nollm \
            -ldflags "-H windowsgui -X main.version=${{ github.ref_name }}" \
            -o dist/aigw-tray-${{ matrix.suffix }}.exe \
            ./cmd/aigw-tray

      - name: Build Tray Manager (macOS native arch only)
        if: matrix.goos == 'darwin' && matrix.goarch == 'arm64'
        run: |
          go build \
            -ldflags "-X main.version=${{ github.ref_name }}" \
            -o dist/aigw-tray-${{ matrix.suffix }} \
            ./cmd/aigw-tray

      - uses: actions/upload-artifact@v4
        with:
          name: aigw-${{ matrix.suffix }}
          path: dist/

  windows-installer:
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: aigw-windows-amd64
          path: build-artifacts/

      # Place binaries where installer.iss expects them: dist/windows/
      - name: Prepare installer layout
        shell: bash
        run: |
          mkdir -p dist/windows
          cp build-artifacts/aigw-windows-amd64.exe dist/windows/aigw.exe
          cp build-artifacts/aigw-tray-windows-amd64.exe dist/windows/aigw-tray.exe

      - name: Create Inno Setup installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.4
        with:
          path: scripts/installer.iss

      - uses: actions/upload-artifact@v4
        with:
          name: trustgate-installer
          path: scripts/Output/TrustGate-Windows-*.exe

  macos-installer:
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: aigw-darwin-arm64
          path: dist/

      - name: Import signing certificates
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_APP_CERTIFICATE_P12: ${{ secrets.APPLE_APP_CERTIFICATE_P12 }}
          APPLE_APP_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_APP_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          # Import Developer ID Installer certificate
          CERT_PATH=$RUNNER_TEMP/installer.p12
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          # Import Developer ID Application certificate
          APP_CERT_PATH=$RUNNER_TEMP/application.p12
          echo "$APPLE_APP_CERTIFICATE_P12" | base64 --decode > "$APP_CERT_PATH"
          security import "$APP_CERT_PATH" -P "$APPLE_APP_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: List downloaded artifacts
        run: ls -la dist/

      - name: Sign binaries
        run: |
          for bin in dist/aigw-*; do
            chmod +x "$bin"
            codesign --force --options runtime \
              --sign "Developer ID Application: yosuke seno (3P7L77PES2)" \
              "$bin"
          done

      - name: Build .pkg installer
        env:
          MACOS_SIGN_IDENTITY: "Developer ID Installer: yosuke seno (3P7L77PES2)"
        run: bash scripts/build-macos-pkg.sh "${{ github.ref_name }}" arm64 dist

      - name: Notarize .pkg
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          PKG_FILE=$(ls TrustGate-macOS-*.pkg)
          # Submit and capture submission ID
          SUBMIT_OUTPUT=$(xcrun notarytool submit "$PKG_FILE" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait 2>&1) || true
          echo "$SUBMIT_OUTPUT"
          # Extract submission ID and fetch log on failure
          SUB_ID=$(echo "$SUBMIT_OUTPUT" | grep "id:" | head -1 | awk '{print $2}')
          if echo "$SUBMIT_OUTPUT" | grep -q "Invalid"; then
            echo "=== Notarization Log ==="
            xcrun notarytool log "$SUB_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" || true
            exit 1
          fi
          xcrun stapler staple "$PKG_FILE"

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/signing.keychain-db || true

      - uses: actions/upload-artifact@v4
        with:
          name: trustgate-installer-macos-arm64
          path: TrustGate-macOS-*.pkg

  linux-installer:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            artifact: aigw-linux-amd64
          - arch: arm64
            artifact: aigw-linux-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/

      - name: Build .deb package
        run: bash scripts/build-linux-deb.sh "${{ github.ref_name }}" "${{ matrix.arch }}" dist

      - uses: actions/upload-artifact@v4
        with:
          name: trustgate-installer-linux-${{ matrix.arch }}
          path: TrustGate-Linux-*.deb

  release:
    needs: [build, windows-installer, macos-installer, linux-installer]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: trustgate-installer
          path: artifacts/windows/

      - uses: actions/download-artifact@v4
        with:
          name: trustgate-installer-macos-arm64
          path: artifacts/macos/

      - uses: actions/download-artifact@v4
        with:
          name: trustgate-installer-linux-amd64
          path: artifacts/linux-amd64/

      - uses: actions/download-artifact@v4
        with:
          name: trustgate-installer-linux-arm64
          path: artifacts/linux-arm64/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows/TrustGate-Windows-*.exe
            artifacts/macos/TrustGate-macOS-*.pkg
            artifacts/linux-*/TrustGate-Linux-*.deb
          generate_release_notes: true
          body: |
            ## TrustGate ${{ github.ref_name }}

            AI Zero Trust Gateway for Workforce — Monitor and control employee AI usage (ChatGPT, Gemini, Claude.ai, Copilot) in real time.

            ---

            ### Downloads

            | Platform | File | Description |
            |----------|------|-------------|
            | **Windows** | `TrustGate-Windows-*.exe` | Installer (Agent + Tray Manager + browser extension) |
            | **macOS (Apple Silicon)** | `TrustGate-macOS-*-arm64.pkg` | Installer (Agent + Tray Manager) |
            | **Linux (x86_64)** | `TrustGate-Linux-*-amd64.deb` | Debian/Ubuntu package with systemd service |
            | **Linux (ARM)** | `TrustGate-Linux-*-arm64.deb` | Debian/Ubuntu package with systemd service |

            ### Quick Start

            **Windows:**
            1. Download and run `TrustGate-Windows-*.exe`
            2. Follow the installer wizard
            3. TrustGate Agent starts automatically as a Windows Service

            **macOS:**
            1. Download `TrustGate-macOS-*-arm64.pkg`
            2. Double-click to run the installer
            3. TrustGate Agent starts automatically as a launchd service

            **Linux (Debian/Ubuntu):**
            ```bash
            sudo dpkg -i TrustGate-Linux-*-amd64.deb
            # Agent starts automatically via systemd
            sudo systemctl status trustgate
            ```

            ### Verify Installation

            ```bash
            curl -s http://localhost:8787/v1/health | jq .
            ```

            ---

            > **Documentation:** See [README](https://github.com/sator-inc-com/trustgate-core#readme) for full setup guide.
