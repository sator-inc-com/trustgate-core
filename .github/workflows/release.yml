name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
            runner: ubuntu-latest
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: .exe
            runner: ubuntu-latest
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
            runner: macos-latest
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
            runner: macos-latest

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Generate Windows resource files (icon, version info, manifest)
      - name: Install go-winres
        if: matrix.goos == 'windows'
        run: go install github.com/tc-hib/go-winres@latest

      - name: Generate Windows resources
        if: matrix.goos == 'windows'
        run: |
          cd cmd/aigw && go-winres make && cd ../..
          cd cmd/aigw-tray && go-winres make && cd ../..

      - name: Build Agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist
          TAGS=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            TAGS="-tags nollm"
          fi
          go build $TAGS \
            -ldflags "-X main.version=${{ github.ref_name }}" \
            -o dist/aigw-${{ matrix.suffix }}${{ matrix.ext }} \
            ./cmd/aigw

      - name: Build Tray Manager (Windows)
        if: matrix.goos == 'windows'
        env:
          GOOS: windows
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build -tags nollm \
            -ldflags "-H windowsgui -X main.version=${{ github.ref_name }}" \
            -o dist/aigw-tray-${{ matrix.suffix }}.exe \
            ./cmd/aigw-tray

      - name: Build Tray Manager (macOS native arch only)
        if: matrix.goos == 'darwin' && matrix.goarch == 'arm64'
        run: |
          go build \
            -ldflags "-X main.version=${{ github.ref_name }}" \
            -o dist/aigw-tray-${{ matrix.suffix }} \
            ./cmd/aigw-tray

      - uses: actions/upload-artifact@v4
        with:
          name: aigw-${{ matrix.suffix }}
          path: dist/

  windows-installer:
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: aigw-windows-amd64
          path: build-artifacts/

      # Place binaries where installer.iss expects them: dist/windows/
      - name: Prepare installer layout
        shell: bash
        run: |
          mkdir -p dist/windows
          cp build-artifacts/aigw-windows-amd64.exe dist/windows/aigw.exe
          cp build-artifacts/aigw-tray-windows-amd64.exe dist/windows/aigw-tray.exe

      - name: Create Inno Setup installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.4
        with:
          path: scripts/installer.iss

      - uses: actions/upload-artifact@v4
        with:
          name: trustgate-installer
          path: scripts/Output/TrustGate-Setup-*.exe

  release:
    needs: [build, windows-installer]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/aigw-*/aigw-*
            artifacts/trustgate-installer/TrustGate-Setup-*.exe
          generate_release_notes: true
          body: |
            ## TrustGate ${{ github.ref_name }}

            AI Zero Trust Gateway — AI の入出力をリアルタイムで検査・制御します。

            ---

            ### Downloads

            | Platform | File | Description |
            |----------|------|-------------|
            | **Windows (recommended)** | `TrustGate-Setup-*.exe` | Installer (Agent + Tray Manager + browser extension) |
            | Windows (manual) | `aigw-windows-amd64.exe` | Agent binary only |
            | macOS (Apple Silicon) | `aigw-darwin-arm64` | Agent binary (M1/M2/M3/M4) |
            | macOS (Intel) | `aigw-darwin-amd64` | Agent binary (Intel Mac) |
            | Linux (x86_64) | `aigw-linux-amd64` | Agent binary |
            | Linux (ARM) | `aigw-linux-arm64` | Agent binary |

            ### Quick Start

            **Windows:**
            1. Download and run `TrustGate-Setup-*.exe`
            2. Follow the installer wizard
            3. TrustGate Agent starts automatically as a Windows Service

            **macOS / Linux:**
            ```bash
            # Make executable
            chmod +x aigw-*

            # Initialize configuration
            ./aigw init --provider bedrock --with-samples

            # Check environment
            ./aigw doctor

            # Start (with mock backend for testing)
            ./aigw serve --mock-backend
            ```

            ### Verify Installation

            ```bash
            curl -s http://localhost:8787/v1/health | jq .
            ```

            ---

            > **Documentation:** See [README](https://github.com/sator-inc-com/trustgate-core#readme) for full setup guide.
