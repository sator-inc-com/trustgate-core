name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test $(go list ./... | grep -v /cmd/aigw-tray)

      - name: Run tests (controlplane)
        run: go test -tags controlplane ./...

      - name: Vet
        run: go vet $(go list ./... | grep -v /cmd/aigw-tray)

  build:
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: .exe
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Generate Windows resource files (icon, version info, manifest)
      - name: Install go-winres
        if: matrix.goos == 'windows'
        run: go install github.com/tc-hib/go-winres@latest

      - name: Generate Windows resources
        if: matrix.goos == 'windows'
        run: |
          cd cmd/aigw && go-winres make && cd ../..
          cd cmd/aigw-tray && go-winres make && cd ../..

      - name: Build Agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist
          TAGS=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            TAGS="-tags nollm"
          fi
          go build $TAGS \
            -ldflags "-X main.version=ci-${{ github.sha }}" \
            -o dist/aigw-${{ matrix.suffix }}${{ matrix.ext }} \
            ./cmd/aigw

      - name: Build Tray Manager (Windows)
        if: matrix.goos == 'windows'
        env:
          GOOS: windows
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build -tags nollm \
            -ldflags "-H windowsgui -X main.version=ci-${{ github.sha }}" \
            -o dist/aigw-tray-${{ matrix.suffix }}.exe \
            ./cmd/aigw-tray

      - uses: actions/upload-artifact@v4
        with:
          name: aigw-${{ matrix.suffix }}
          path: dist/
